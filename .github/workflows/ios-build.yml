name: Build iOS Development Client
on:
  workflow_dispatch: # 允許手動點擊按鈕觸發構建

jobs:
  build:
    runs-on: macos-latest # 使用 GitHub 的 Mac 伺服器
    steps:
      - name: 🏗 Checkout repository
        uses: actions/checkout@v4

      - name: 🍏 Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 18
          cache: 'npm'

      - name: 🚀 Setup Expo and EAS
        uses: expo/expo-github-action@v8
        with:
          expo-version: latest
          eas-version: latest # 明確要求安裝最新版的 EAS CLI
          eas-cache: true
          token: ${{ secrets.EXPO_TOKEN }}

      - name: 📦 Install dependencies
        run: npm install

      - name: 🛠 Build iOS local
        # 使用 npx eas 確保指令能被正確找到
        run: npx eas build --platform ios --profile development --local --non-interactive --output=./rainy-hk-dev.ipa

      - name: 📤 Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: ios-dev-build
          path: ./rainy-hk-dev.ipa
