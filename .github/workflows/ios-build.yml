name: Build iOS Development Client
on:
  workflow_dispatch: # 允許手動點擊按鈕觸發構建

jobs:
  build:
    runs-on: macos-latest # 使用 GitHub 的 Mac 伺服器
    steps:
      - name: 🏗 Checkout repository
        uses: actions/checkout@v4

      - name: 🍏 Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20 # 升級到 LTS 版本更穩定
          cache: 'npm'

      - name: 🚀 Setup Expo
        uses: expo/expo-github-action@v8
        with:
          expo-version: latest
          token: ${{ secrets.EXPO_TOKEN }}

      - name: 📦 Install EAS CLI and Dependencies
        run: |
          npm install -g eas-cli
          npm install

      - name: 🛠 Build iOS local
        run: eas build --platform ios --profile development --local --non-interactive --output=./rainy-hk-dev.ipa

      - name: 📤 Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: ios-dev-build
          path: ./rainy-hk-dev.ipa
